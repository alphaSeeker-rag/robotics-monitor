<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 320" fill="none" stroke="#9b2226" stroke-width="1.4">
  <!-- main vertical traces (span full height for seamless vertical tiling) -->
  <line x1="26" y1="0" x2="26" y2="320"/>
  <line x1="50" y1="0" x2="50" y2="320"/>
  <line x1="70" y1="0" x2="70" y2="320"/>

  <!-- branch trace 1 -->
  <path d="M26 48 h22 v18"/>
  <circle cx="26" cy="48" r="3.4" fill="#9b2226" stroke="none"/>
  <rect x="44" y="64" width="12" height="12" rx="2" fill="#fbfaf6"/>

  <!-- branch trace 2 -->
  <path d="M70 96 h-20 v22"/>
  <circle cx="70" cy="96" r="3.4" fill="#9b2226" stroke="none"/>
  <circle cx="50" cy="118" r="4.5" fill="none"/>

  <!-- branch trace 3 -->
  <path d="M50 158 h-24 v16"/>
  <rect x="20" y="172" width="12" height="12" rx="2" fill="#fbfaf6"/>
  <circle cx="50" cy="158" r="3.4" fill="#9b2226" stroke="none"/>

  <!-- branch trace 4 -->
  <path d="M26 214 h28"/>
  <circle cx="54" cy="214" r="4.5" fill="none"/>
  <circle cx="26" cy="214" r="3.4" fill="#9b2226" stroke="none"/>

  <!-- branch trace 5 -->
  <path d="M70 250 h-20 v20"/>
  <circle cx="70" cy="250" r="3.4" fill="#9b2226" stroke="none"/>
  <rect x="44" y="268" width="12" height="12" rx="2" fill="#fbfaf6"/>

  <!-- branch trace 6 -->
  <path d="M26 300 h22"/>
  <circle cx="48" cy="300" r="3.4" fill="#9b2226" stroke="none"/>

  <!-- via dots along traces -->
  <circle cx="50" cy="30" r="2.2" fill="#9b2226" stroke="none"/>
  <circle cx="70" cy="180" r="2.2" fill="#9b2226" stroke="none"/>
  <circle cx="26" cy="138" r="2.2" fill="#9b2226" stroke="none"/>
</svg>
